name:  Docker Build & Push

# ──────────────────────────────────────────────────────────────────
# Builds and pushes the lean FastAPI app Docker image to Docker Hub.
# Only triggers on push to main (not PRs) to avoid redundant builds.
# ──────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI
  push:
    branches: [main]
    paths:
      - "app.py"
      - "src/model_server.py"
      - "templates/**"
      - "static/**"
      - "requirements_app.txt"
      - "Dockerfile"
      - ".github/workflows/docker_build.yml"

jobs:
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Extract metadata for Docker image tags ────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/salary-predictor
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest

      # ── Login to Docker Hub ───────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & Push using Buildx (multi-platform support) ────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed image digest - ${{ steps.build-push.outputs.digest }}"

  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Cluster
        run: |
          # Create secret directly from GitHub Secrets (since secret.yaml is gitignored)
          kubectl create secret generic wandb-secret \
            --from-literal=WANDB_API_KEY=${{ secrets.WANDB_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # Apply the rest of the manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
