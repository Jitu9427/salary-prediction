apiVersion: v1
kind: Service
metadata:
  name: salary-predictor-service
  labels:
    app: salary-predictor
spec:
  type: NodePort             # NodePort exposes the service on Minikube's IP
  selector:
    app: salary-predictor
  ports:
    - protocol: TCP
      port: 80               # Port exposed inside the cluster
      targetPort: 8000       # FastAPI port inside the container
      nodePort: 30080        # Port accessible from outside: http://<minikube-ip>:30080
