# ══════════════════════════════════════════════════════════════════════════════
# config/params.yaml
# ML hyper-parameters for every pipeline stage.
# Used by DVC `params` tracking – edit here to trigger reruns.
# ══════════════════════════════════════════════════════════════════════════════

# ── Preprocessing ─────────────────────────────────────────────────────────────
preprocessing:
  outlier_method: "iqr"        # iqr | zscore
  outlier_threshold: 1.5       # IQR multiplier (or z-score threshold)
  target_col: "salary_in_usd"

# ── Base learners for stacking ensemble ───────────────────────────────────────
base_models:
  random_forest:
    n_estimators: 300
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    n_jobs: -1
    random_state: 42

  gradient_boosting:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    random_state: 42

  ridge:
    alpha: 10.0

# ── Meta-learner ──────────────────────────────────────────────────────────────
meta_learner:
  model: "ridge"
  alpha: 1.0
  cv_folds: 5

# ── Evaluation thresholds ─────────────────────────────────────────────────────
evaluation:
  min_r2: 0.35           # model must beat this to be registered
  max_rmse: 60000        # USD – upper bound for acceptable RMSE
