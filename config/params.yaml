# ══════════════════════════════════════════════════════════════════════════════
# config/params.yaml
# ML hyper-parameters for every pipeline stage.
# Used by DVC `params` tracking – edit here to trigger reruns.
# ══════════════════════════════════════════════════════════════════════════════

# ── Preprocessing ─────────────────────────────────────────────────────────────
preprocessing:
  outlier_method: null         # Notebook didn't use outlier removal
  outlier_threshold: 1.5       # IQR multiplier (or z-score threshold)
  target_col: "salary_usd"

# ── Base learners for stacking ensemble ───────────────────────────────────────
base_models:
  lightgbm:
    n_estimators: 500
    learning_rate: 0.5
    random_state: 42
    force_col_wise: true

  xgboost:
    n_estimators: 500
    learning_rate: 0.5
    random_state: 42

# ── Meta-learner ──────────────────────────────────────────────────────────────
meta_learner:
  model: "ridge"
  alpha: 1.0
  cv_folds: 5
  shuffle: true
  random_state: 23

# ── Evaluation thresholds ─────────────────────────────────────────────────────
evaluation:
  min_r2: 0.35           # model must beat this to be registered
  max_rmse: 60000        # USD – upper bound for acceptable RMSE
