# ══════════════════════════════════════════════════════════════════════════════
# config/config.yaml
# Project-level configuration for the Salary-Prediction MLOps pipeline.
# All path values are RELATIVE to the project root unless noted.
# ══════════════════════════════════════════════════════════════════════════════

# ── Kaggle dataset ────────────────────────────────────────────────────────────
kaggle:
  dataset: "mohankrishnathalla/global-ai-and-data-jobs-salary-dataset"   # <username>/<dataset-slug> on Kaggle
  filename: "global_ai_jobs.csv"              # file inside the downloaded zip

# ── Directory layout ──────────────────────────────────────────────────────────
directories:
  raw_data:       "data/raw"           # untouched downloads land here
  processed_data: "data/processed"     # train / test splits
  logs:           "logs"               # rotating log files

# ── Data ingestion settings ───────────────────────────────────────────────────
data_ingestion:
  test_size:    0.20     # 20 % held out for test
  random_state: 22       # Notebook uses 22
  stratify_col: null     # Notebook does not stratify
  train_filename: "train.csv"
  test_filename:  "test.csv"

# ── Artifact filenames ────────────────────────────────────────────────────────
artifacts:
  ingestion_report: "reports/data_ingestion_report.json"
